<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Hello Wicket</title>
</head>
<body>
    <table class="dataview table">
        <tbody>
        <tr>
            <th>Id</th>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Role</th>
            <th>Supervisor</th>
        </tr>
        <tr wicket:id="employees">
            <td><span wicket:id="id"></span></td>
            <td><span wicket:id="firstName"></span></td>
            <td><span wicket:id="lastName"></span></td>
            <td><span wicket:id="role"></span></td>
            <td><span wicket:id="supervisor"></span></td>
            <td><a href="#" wicket:id="editEmployee" class="btn btn-primary">Edit employee</a> <a href="#" wicket:id="removeEmployee" class="btn btn-primary">Remove employee</a> <a href="#" wicket:id="listSubordinates" class="btn btn-primary">List Subordinates</a></td>
        </tr>
        </tbody>
    </table>
    <div wicket:id="navigator"></div>
    <br>
    <a href="#" wicket:id="addEmployee" class="btn btn-primary">Add employee</a>
</body>
</html>
