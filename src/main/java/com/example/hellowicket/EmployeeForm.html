<html>
<head>
    <title></title>
</head>
<body>
<wicket:panel>
<form wicket:id="employeeForm">
    <ul wicket:id="feedback" class="feedbackPanel">
        <li class="feedbackPanelERROR">
            <span class="feedbackPanelERROR">Field 'Username' is required.</span>
        </li>
    </ul>
    <fieldset>
        <span>Firstname: </span><input wicket:id="firstName" type="text" id="firstName" />
        <span>Lastname: </span><input wicket:id="lastName" type="text" id="lastName" />
        <span>Role: </span><select wicket:id="role"></select>
        <span>Supervisor: </span><select wicket:id="supervisor"></select>
        <p>
            <input type="submit" name="submit" value="submit"/>
        </p>
    </fieldset>
</form>
</wicket:panel>
</body>
</html>
