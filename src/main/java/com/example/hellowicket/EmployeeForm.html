</head>

<wicket:panel>
<form wicket:id="employeeForm">

        <li class="feedbackPanelERROR">
            <span class="feedbackPanelERROR">Field 'Username' is required.</span>
        </li>
    </ul>
    <fieldset>
        <label wicket:for="firstName"><wicket:label/></label> <input wicket:id="firstName" type="text" id="firstName" />

        <label wicket:for="role"><wicket:label/></label> <select wicket:id="role"></select>
        <label wicket:for="supervisor"><wicket:label/></label> <select wicket:id="supervisor"></select>
        <p>
            <input type="submit" name="submit" value="submit"/>
        </p>
    </fieldset>
</form>
</wicket:panel>
