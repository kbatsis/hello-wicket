<html>
<head>
    <title></title>
</head>
<body>
<wicket:panel>
<form wicket:id="employeeForm">
    <ul wicket:id="feedback" class="feedbackPanel">
        <li class="feedbackPanelERROR">
            <span class="feedbackPanelERROR">Field 'Username' is required.</span>
        </li>
    </ul>
    <fieldset class="row g-3">
        <div class="col-md-6">
            <label wicket:for="firstName" class="form-label"><wicket:label/></label> <input wicket:id="firstName" type="text" id="firstName" class="form-control"/>
        </div>
        <div class="col-md-6">
            <label wicket:for="lastName" class="form-label"><wicket:label/></label> <input wicket:id="lastName" type="text" id="lastName" class="form-control"/>
        </div>
        <div class="col-md-6">
            <label wicket:for="role" class="form-label"><wicket:label/></label> <select wicket:id="role" class="form-control"></select>
        </div>
        <div class="col-md-6">
            <label wicket:for="supervisor" class="form-label"><wicket:label/></label> <select wicket:id="supervisor" class="form-control"></select>
        </div>
        <p>
            <input type="submit" name="submit" value="Submit" class="btn btn-primary"/>
        </p>
    </fieldset>
</form>
</wicket:panel>
</body>
</html>
